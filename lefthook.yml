commit-msg:
  jobs:
    - name: commitlint
      run: commitlint --edit {1}
pre-commit:
  jobs:
    - name: EditorConfig
      run: editorconfig-checker {staged_files}
    - name: Nix
      group:
        parallel: false
        jobs:
          - name: deadnix
            run: deadnix --edit {staged_files}
            glob: "*.nix"
            stage_fixed: true
          - name: statix
            run: statix fix
            glob: "*.nix"
            stage_fixed: true
          - name: Nix fmt
            run: nixfmt {staged_files}
            glob: "*.nix"
            stage_fixed: true
    - name: Oxfmt
      run: oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    - name: yamllint
      run: yamllint --list-files --strict {staged_files}
      glob: "*.{yaml,yml}"
