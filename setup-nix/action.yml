name: setup-nix
description: Set up a Nix environment
inputs:
  cachix-auth-token:
    description: Authentication token for Cachix
    required: true
  cachix-name:
    description: Name of the Cachix cache
    required: false
    default: ponko2
  prefetch-dependencies:
    description: Run `nix --quiet develop --command true` after setup.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
    - name: Set up Cachix
      uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
      with:
        name: ${{ inputs.cachix-name }}
        authToken: ${{ inputs.cachix-auth-token }}
    - name: Prefetch Nix dependencies
      if: ${{ inputs.prefetch-dependencies == 'true' }}
      shell: bash
      run: nix --quiet develop --command true
